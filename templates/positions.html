{% extends "base.html" %}
{% block title %}Pozicione - LENA{% endblock %}

{% block content %}
<!-- Header -->
<section style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color:white; padding:3rem 2rem;">
    <div class="container">
        <h1 style="font-size:2rem; margin-bottom:0.5rem;" data-i18n="positions.title">LENA — Databaza e Pozicioneve</h1>
        <p style="opacity:0.9;" data-i18n="positions.subtitle">Gjej apprenticeship-in e duhur tek kompanitë partnere në Maqedoni</p>
    </div>
</section>

<!-- Search & Filters -->
<section style="padding:1.5rem 2rem; background:var(--white); border-bottom:1px solid var(--border);">
    <div class="container">
        <div class="search-bar" style="box-shadow:none; padding:0;">
            <div class="form-group" style="flex:2;">
                <label>Kërko</label>
                <input type="text" class="form-control" id="search-input" placeholder="Kërko profesion, kompani, ose pozicion..." onkeyup="if(event.key==='Enter') searchPositions()">
            </div>
            <div class="form-group">
                <label>Kategoria</label>
                <select class="form-control" id="filter-category" onchange="searchPositions()">
                    <option value="">Të gjitha</option>
                </select>
            </div>
            <div class="form-group">
                <label>Qyteti</label>
                <select class="form-control" id="filter-city" onchange="searchPositions()">
                    <option value="">Të gjitha</option>
                </select>
            </div>
            <div class="form-group" style="min-width:auto;">
                <label>&nbsp;</label>
                <button class="btn btn-primary" onclick="searchPositions()" data-i18n="common.search">Kërko</button>
            </div>
        </div>
    </div>
</section>

<!-- Results -->
<section class="section">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:0.75rem;">
            <p id="positions-count" style="color:var(--text-light); font-weight:500;"></p>
            <div style="display:flex; align-items:center; gap:0.75rem;">
                <select class="form-control" id="sort-select" onchange="searchPositions()" style="width:auto; padding:0.3rem 0.75rem; font-size:0.85rem;">
                    <option value="newest">Më të reja</option>
                    <option value="salary_high">Rroga ↓</option>
                    <option value="salary_low">Rroga ↑</option>
                    <option value="start_date">Data fillimit</option>
                    <option value="available">Vende të lira</option>
                </select>
                <span style="font-size:0.8rem; color:var(--text-light);">LENA</span>
            </div>
        </div>

        <div class="grid grid-2" id="positions-list">
            <div class="loading"><div class="spinner"></div></div>
        </div>

        <div id="pagination" style="display:flex; gap:0.5rem; justify-content:center; margin-top:2rem; flex-wrap:wrap;"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>loadPositionsPage();</script>
{% endblock %}
